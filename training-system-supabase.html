<script>
// ===== Supabase 配置 =====
const SUPABASE_URL = 'https://nrzzzotyaoigjfvrvzmz.supabase.co';  // 例如: https://your-project.supabase.co
const SUPABASE_ANON_KEY = '';  // 例如: eyJhbGciOiJIUzI1NiIs...
let supabaseClient = null;
let isConnected = false;

function initSupabase() {
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        showConfigPanel();
        return false;
    }
    try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        isConnected = true;
        updateSyncStatus('online');
        return true;
    } catch (e) {
        console.error('Supabase 初始化失败:', e);
        updateSyncStatus('offline');
        return false;
    }
}

function updateSyncStatus(status) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.className = 'sync-status ' + status;
    if (status === 'online') el.innerHTML = '<i class="fas fa-circle"></i> <span>已连接</span>';
    else if (status === 'offline') el.innerHTML = '<i class="fas fa-circle"></i> <span>未连接</span>';
    else if (status === 'syncing') el.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>同步中...</span>';
}

function showConfigPanel() {
    const contentDiv = document.getElementById('dynamicContent');
    contentDiv.innerHTML = `
        <div class="config-section">
            <div class="config-title"><i class="fas fa-cog"></i> 首次使用配置</div>
            <p style="margin-bottom: 15px; color: #333;">请填写您的 Supabase 配置信息：</p>
            <div style="max-width: 600px;">
                <label style="font-weight: 600; color: #555;">Supabase URL:</label>
                <input type="text" id="configUrl" class="config-input" placeholder="https://your-project.supabase.co" value="${SUPABASE_URL}">
                <label style="font-weight: 600; color: #555;">Anon Key:</label>
                <input type="text" id="configKey" class="config-input" placeholder="eyJhbGciOiJIUzI1NiIs..." value="${SUPABASE_ANON_KEY}">
                <button class="btn btn-primary" onclick="saveConfig()" style="margin-top: 15px;"><i class="fas fa-save"></i> 保存配置</button>
            </div>
            <div class="config-note"><i class="fas fa-info-circle"></i> 配置信息仅保存在当前浏览器，如需永久保存请修改HTML文件中的 SUPABASE_URL 和 SUPABASE_ANON_KEY 变量</div>
        </div>`;
}

function saveConfig() {
    const url = document.getElementById('configUrl').value.trim();
    const key = document.getElementById('configKey').value.trim();
    if (!url || !key) { alert('请填写完整的配置信息'); return; }
    window.SUPABASE_URL = url;
    window.SUPABASE_ANON_KEY = key;
    if (initSupabase()) {
        showSuccessToast('配置成功！');
        setTimeout(() => { switchRole('admin'); }, 500);
    } else {
        alert('配置失败，请检查URL和Key是否正确');
    }
}

(function(){
    const monthOptions = ['2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12','2027-01','2027-02','2027-03'];
    const moduleOptions = ['①','②','③','④','⑤','⑥'];
    let courses = ['AI基础','机器学习','深度学习','LLM实战','数据治理'];
    let untrainedEmployees = [];
    let submissions = [];
    let deadline = null;
    let positionGradeMap = new Map();
    const ADMIN_USER = 'ctfhr';
    const ADMIN_PASSWORD = 'ctfhr@2025';
    let historyYear = 'all', historyQuarter = 'all', historyMonth = 'all', historyGrade = 'all';
    let selectedDept = 'all';
    let currentSelectedEmpId = null;
    let currentCourseSelections = [];
    let editingSubmissionId = null;
    let dataSubscription = null;

    async function loadEmployees() {
        if (!supabaseClient) return;
        updateSyncStatus('syncing');
        try {
            const { data, error } = await supabaseClient.from('employees').select('*').order('created_at', { ascending: false });
            if (error) throw error;
            untrainedEmployees = data || [];
            updateSyncStatus('online');
        } catch (e) { console.error('加载员工失败:', e); updateSyncStatus('offline'); }
    }

    async function importEmployees(employees) {
        if (!supabaseClient) return { error: '未连接' };
        updateSyncStatus('syncing');
        try {
            const { data, error } = await supabaseClient.from('employees').upsert(employees.map(e => ({
                employee_id: e.工号, name: e.姓名, department: e.部门, position: e.职务
            })), { onConflict: 'employee_id' });
            if (error) throw error;
            await loadEmployees();
            updateSyncStatus('online');
            return { data, error: null };
        } catch (e) { updateSyncStatus('offline'); return { data: null, error: e }; }
    }

    async function loadRegistrations() {
        if (!supabaseClient) return;
        updateSyncStatus('syncing');
        try {
            const { data, error } = await supabaseClient.from('registrations').select('*, employees(name, department, position)').order('created_at', { ascending: false });
            if (error) throw error;
            submissions = (data || []).map(r => ({

            currentSelectedEmpId = empId;
            const emp = findEmployeeByEmpId(empId);
            if (emp) { currentCourseSelections = []; renderTrainee(); showSuccessToast(`已选择员工 ${emp.name}`); }
        };

        document.querySelectorAll('.selectable-id').forEach(el => { el.addEventListener('click', function(e) { e.stopPropagation(); const empId = this.getAttribute('data-emp-id'); selectEmployee(empId); }); });

        setTimeout(() => {
            function updateSelections() {
                const newSelections = [];
                document.querySelectorAll('.course-check:checked').forEach(cb => {
                    const course = cb.value;
                    const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                    const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                    if (cb.checked) { newSelections.push({ course: course, module: moduleSelect ? moduleSelect.value : moduleOptions[0], month: monthSelect ? monthSelect.value : monthOptions[0] }); }
                    if (moduleSelect) moduleSelect.disabled = !cb.checked;
                    if (monthSelect) monthSelect.disabled = !cb.checked;
                });
                currentCourseSelections = newSelections;
                const submitBtn = document.getElementById('submitMultiCourses');
                if (submitBtn) { submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> 批量提交 (${currentCourseSelections.length})`; submitBtn.disabled = currentCourseSelections.length === 0; }
            }

            document.querySelectorAll('.course-check').forEach(cb => {
                cb.addEventListener('change', updateSelections);
                const course = cb.value;
                const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                if (moduleSelect) moduleSelect.disabled = !cb.checked;
                if (monthSelect) monthSelect.disabled = !cb.checked;
            });

            document.querySelectorAll('.module-select, .month-select').forEach(select => { select.addEventListener('change', updateSelections); });

            const clearBtn = document.getElementById('clearMultiSelections');
            if (clearBtn) {
                clearBtn.addEventListener('click', function() {
                    document.querySelectorAll('.course-check').forEach(cb => {
                        cb.checked = false;
                        const course = cb.value;
                        const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                        const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                        if (moduleSelect) moduleSelect.disabled = true;
                        if (monthSelect) monthSelect.disabled = true;
                    });
                    currentCourseSelections = [];
                    renderTrainee();
                });
            }

            const submitMultiBtn = document.getElementById('submitMultiCourses');
            if (submitMultiBtn) {
                submitMultiBtn.addEventListener('click', async function() {
                    if (!currentSelectedEmpId) { alert('请先选择员工'); return; }
                    if (currentCourseSelections.length === 0) { alert('请至少选择一门课程'); return; }
                    if (deadline && new Date() > new Date(deadline)) { alert('报名已截止'); return; }
                    const emp = findEmployeeByEmpId(currentSelectedEmpId);
                    if (!emp) { alert('员工信息不存在'); return; }
                    const duplicateCourses = [];
                    const newSubmissions = [];
                    currentCourseSelections.forEach(sel => {
                        if (isAlreadySubmitted(currentSelectedEmpId, sel.course)) { duplicateCourses.push(sel.course); }
                        else { newSubmissions.push({ 工号: emp.employee_id, 姓名: emp.name, 部门: emp.department, 职务: emp.position || '未填写', 课程: sel.course, 月份: sel.month, 模块: sel.module, 审核状态: '待审核', 请假状态: '' }); }
                    });
                    if (duplicateCourses.length > 0) { alert(`以下课程已报名，不能重复提交：${duplicateCourses.join('、')}`); if (newSubmissions.length === 0) return; }
                    let successCount = 0;
                    for (const sub of newSubmissions) { const result = await addRegistration(sub); if (!result.error) successCount++; }
                    currentCourseSelections = [];
                    showSuccessToast(`成功提交 ${successCount} 门课程报名`);
                    await loadRegistrations();
                    renderTrainee();
                });
            }
        }, 100);

        const empIdInp = document.getElementById('empIdInput');
        const nameInp = document.getElementById('nameInput');
        const deptInp = document.getElementById('deptInput');
        const posInp = document.getElementById('posInput');
        const singleSubmitBtn = document.getElementById('singleSubmitBtn');
        const singleFeedback = document.getElementById('singleFeedbackMsg');

        if (empIdInp) {
            empIdInp.addEventListener('blur', function() {
                const empId = this.value.trim();
                if (!empId) return;
                const emp = findEmployeeByEmpId(empId);
                if (emp) { nameInp.value = emp.name || ''; deptInp.value = emp.department || ''; posInp.value = emp.position || ''; selectEmployee(empId); }
            });
        }

        if (singleSubmitBtn) {
            singleSubmitBtn.addEventListener('click', async function() {
                const empId = empIdInp.value.trim();
                const name = nameInp.value.trim();
                const dept = deptInp.value.trim();
                const pos = posInp.value.trim();
                const course = document.getElementById('courseSelect').value;
                const month = document.getElementById('monthSelect').value;
                const mod = document.getElementById('moduleSelect').value;
                if (!empId || !name || !dept) { alert('请填写工号、姓名、部门（均为必填）'); return; }
                if (deadline && new Date() > new Date(deadline)) { alert('报名已截止'); return; }
                if (isAlreadySubmitted(empId, course)) { alert('该员工已报名此课程，请勿重复'); return; }
                const newSub = { 工号: empId, 姓名: name, 部门: dept, 职务: pos || '未填写', 课程: course, 月份: month, 模块: mod, 审核状态: '待审核', 请假状态: '' };
                const result = await addRegistration(newSub);
                if (result.error) { alert('提交失败: ' + result.error.message); return; }
                if (singleFeedback) { singleFeedback.style.display = 'inline-flex'; showSuccessToast('报名提交成功'); setTimeout(() => singleFeedback.style.display = 'none', 2000); }
                empIdInp.value = ''; nameInp.value = ''; deptInp.value = ''; posInp.value = '';
                await loadRegistrations();
                renderTrainee();
            });
        }
    }
</script>
</body>
</html>
