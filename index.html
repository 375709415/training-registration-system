        // 从共享存储加载
        function loadSharedData(id) {
            const shared = localStorage.getItem('fy27_share_' + id);
            if (shared) {
                const data = JSON.parse(shared);
                untrainedEmployees = data.untrainedEmployees || [];
                submissions = data.submissions || [];
                deadline = data.deadline || null;
                
                if (data.positionGradeMap) {
                    positionGradeMap = new Map(Object.entries(data.positionGradeMap));
                } else {
                    initPositionGradeMap();
                }
                
                showSuccessToast('已加载共享数据');

            }

        function createShareSession() {
            // 生成唯一的shareId
            const newShareId = sha256(Date.now() + Math.random().toString()).substring(0, 8);
            shareId = newShareId;
            
            // 保存数据到共享存储
            saveSharedData(newShareId);
            
            // 生成分享链接

            return submissions.some(s => s.工号 === empId && s.课程 === course);
        }

            return submissions

            return grade || position;
        }

        function getDeptUntilSecondDash(fullDept) {
            if (!fullDept || typeof fullDept !== 'string') return fullDept;
            const parts = fullDept.split('-');
            if (parts.length >= 3) {
                return parts[0] + '-' + parts[1];
            }
            return fullDept;
        }

            XLSX.writeFile(wb, fileName);

                            <div class="field-group"><label>课程编码</label><select id="courseSelect">${courses.map(c => `<option>${c}</option>`).join('')}</select></div>
                            <div class="field-group"><label>月份</label><select id="monthSelect">${monthOptions.map(m => `<option>${m}</option>`).join('')}</select></div>
                            <div class="field-group"><label>模块</label><select id="moduleSelect">${moduleOptions.map(m => `<option>${m}</option>`).join('')}</select></div>
                        </div>
                        <div class="submit-feedback">
                            <button class="btn btn-primary" id="singleSubmitBtn"><i class="fas fa-paper-plane"></i> 提交报名</button>
                            <span id="singleFeedbackMsg" class="feedback-msg" style="display:none;"><i class="fas fa-check-circle"></i> 提交成功</span>
                        </div>
                        <div style="margin-top:16px; font-size:0.9rem; background:#f5f5f5; border-radius:30px; padding:10px 18px;">
                            <i class="fas fa-lightbulb"></i> 手动填写信息。若工号匹配未培训名单，提交后将自动移除。
                        </div>
                    </div>
                `;
            }

            function buildSubmissionsTable() {
                if (submissions.length === 0) {
                    return `<div style="text-align:center; padding:30px; color:#666;">暂无已提交的报名信息</div>`;
                }

                const sortedSubs = [...submissions].sort((a, b) => new Date(b.提交时间) - new Date(a.提交时间));
                
                return `
                    <div class="submissions-table-container">
                        <table class="submissions-table">
                            <thead>
                                <tr>
                                    <th>工号</th>
                                    <th>姓名</th>
                                    <th>部门</th>
                                    <th>职务</th>
                                    <th>课程</th>
                                    <th>月份</th>
                                    <th>模块</th>
                                    <th>提交时间</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${sortedSubs.map(sub => `
                                    <tr>
                                        <td>${sub.工号}</td>
                                        <td>${sub.姓名}</td>
                                        <td>${getDeptUntilSecondDash(sub.部门)}</td>
                                        <td>${sub.职务 && sub.职务 !== '未填写' ? sub.职务 : '<span style="color:#999; font-style:italic;">未填写</span>'}</td>
                                        <td>${sub.课程}</td>
                                        <td>${sub.月份}</td>
                                        <td>${sub.模块}</td>
                                        <td>${new Date(sub.提交时间).toLocaleString()}</td>
                                        <td><span class="status-badge ${sub.审核状态 === '已审核' ? 'approved' : ''}">${sub.审核状态}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            // 显示当前共享信息
            const shareInfo = shareId ? `
                <div class="cloud-share-section" style="background: #fff3e0; border-color: #ff9800;">
                    <div class="cloud-share-title">
                        <i class="fas fa-share-alt"></i> 当前共享会话
                    </div>
                    <div class="share-id-display">
                        <i class="fas fa-key"></i> 共享ID: ${shareId}
                    </div>
                    <div class="cloud-share-note">
                        ⚠️ 您的报名数据会自动同步到共享存储
                    </div>
                </div>
            ` : '';

            let html = `
                ${shareInfo}
                <div class="note-highlight">
                    <i class="fas fa-info-circle"></i> 当前未培训总人数：<strong>${untrainedEmployees.length}</strong> 
                    ${emptyPosCount > 0 ? `<span style="margin-left:15px; color:#e68a00;"><i class="fas fa-exclamation-triangle"></i> 有 ${emptyPosCount} 人职务信息待补充</span>` : ''}
                </div>

                <div class="reference-section">
                    <div class="section-title"><i class="fas fa-table"></i> 未培训人员名单 (点击工号选择)</div>
                    ${buildExcelTable()}
                </div>

                ${buildMultiCourseSection()}
                ${buildManualForm()}

                <div class="submissions-section">
                    <h3 style="margin-bottom:20px;"><i class="fas fa-history"></i> 已提交报名信息</h3>
                    ${buildSubmissionsTable()}
                </div>
            `;
            contentDiv.innerHTML = html;

            // 表格筛选功能
            const filterId = document.getElementById('filterId');
            const filterName = document.getElementById('filterName');
            const filterDept = document.getElementById('filterDept');
            const filterPos = document.getElementById('filterPos');
            const tbody = document.getElementById('excelTableBody');

            function filterTable() {
                const idVal = filterId.value.toLowerCase();
                const nameVal = filterName.value.toLowerCase();
                const deptVal = filterDept.value.toLowerCase();
                const posVal = filterPos.value.toLowerCase();

                const filtered = untrainedEmployees.filter(emp => {
                    return (emp.工号?.toLowerCase().includes(idVal) ?? true) &&
                           (emp.姓名?.toLowerCase().includes(nameVal) ?? true) &&
                           (emp.部门?.toLowerCase().includes(deptVal) ?? true) &&
                           ((emp.职务 || '').toLowerCase().includes(posVal) ?? true);
                });

                tbody.innerHTML = filtered.map(emp => {
                    const hasPosition = emp.职务 && emp.职务.trim() !== '' && emp.职务 !== 'null' && emp.职务 !== 'undefined' && emp.职务 !== '未填写';
                    return `
                    <tr>
                        <td><span class="selectable-id" style="color:#b33a3a; font-weight:600; cursor:pointer;" data-emp-id="${emp.工号}">${emp.工号 || ''}</span></td>
                        <td>${emp.姓名 || ''}</td>
                        <td>${emp.部门 || ''}</td>
                        <td style="${!hasPosition ? 'color:#999; font-style:italic;' : ''}">${hasPosition ? emp.职务 : '未填写'}</td>
                    </tr>
                `}).join('');
                
                document.querySelectorAll('.selectable-id').forEach(el => {
                    el.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const empId = this.getAttribute('data-emp-id');
                        selectEmployee(empId);
                    });
                });
            }

            [filterId, filterName, filterDept, filterPos].forEach(input => {
                if (input) input.addEventListener('input', filterTable);
            });

            window.selectEmployee = function(empId) {
                currentSelectedEmpId = empId;
                const emp = findEmployeeByEmpId(empId);
                if (emp) {
                    currentCourseSelections = [];
                    renderTrainee();
                    showSuccessToast(`已选择员工 ${emp.姓名}`);
                }
            };

            document.querySelectorAll('.selectable-id').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const empId = this.getAttribute('data-emp-id');
                    selectEmployee(empId);
                });
            });

            setTimeout(() => {
                function updateSelections() {
                    const newSelections = [];
                    document.querySelectorAll('.course-check:checked').forEach(cb => {
                        const course = cb.value;
                        const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                        const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                        
                        if (cb.checked) {
                            newSelections.push({
                                course: course,
                                module: moduleSelect ? moduleSelect.value : moduleOptions[0],
                                month: monthSelect ? monthSelect.value : monthOptions[0]
                            });
                        }
                        
                        if (moduleSelect) moduleSelect.disabled = !cb.checked;
                        if (monthSelect) monthSelect.disabled = !cb.checked;
                    });
                    
                    currentCourseSelections = newSelections;
                    
                    const submitBtn = document.getElementById('submitMultiCourses');
                    if (submitBtn) {
                        submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> 批量提交 (${currentCourseSelections.length})`;
                        submitBtn.disabled = currentCourseSelections.length === 0;
                    }
                }

                document.querySelectorAll('.course-check').forEach(cb => {
                    cb.addEventListener('change', updateSelections);
                    const course = cb.value;
                    const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                    const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                    if (moduleSelect) moduleSelect.disabled = !cb.checked;
                    if (monthSelect) monthSelect.disabled = !cb.checked;
                });

                document.querySelectorAll('.module-select, .month-select').forEach(select => {
                    select.addEventListener('change', updateSelections);
                });

                const clearBtn = document.getElementById('clearMultiSelections');
                if (clearBtn) {
                    clearBtn.addEventListener('click', function() {
                        document.querySelectorAll('.course-check').forEach(cb => {
                            cb.checked = false;
                            const course = cb.value;
                            const moduleSelect = document.querySelector(`.module-select[data-course="${course}"]`);
                            const monthSelect = document.querySelector(`.month-select[data-course="${course}"]`);
                            if (moduleSelect) moduleSelect.disabled = true;
                            if (monthSelect) monthSelect.disabled = true;
                        });
                        currentCourseSelections = [];
                        renderTrainee();
                    });
                }

                const submitMultiBtn = document.getElementById('submitMultiCourses');
                if (submitMultiBtn) {
                    submitMultiBtn.addEventListener('click', function() {
                        if (!currentSelectedEmpId) {
                            alert('请先选择员工');
                            return;
                        }
                        if (currentCourseSelections.length === 0) {
                            alert('请至少选择一门课程');
                            return;
                        }
                        if (deadline && new Date() > new Date(deadline)) {
                            alert('报名已截止'); 
                            return;
                        }

                        const emp = findEmployeeByEmpId(currentSelectedEmpId);
                        if (!emp) {
                            alert('员工信息不存在');
                            return;
                        }

                        const duplicateCourses = [];
                        const newSubmissions = [];
                        
                        currentCourseSelections.forEach(sel => {
                            if (isAlreadySubmitted(currentSelectedEmpId, sel.course)) {
                                duplicateCourses.push(sel.course);
                            } else {
                                newSubmissions.push({
                                    id: Date.now() + '-' + Math.random().toString(36).substr(2,8) + '-' + sel.course,
                                    工号: emp.工号,
                                    姓名: emp.姓名,
                                    部门: emp.部门,
                                    职务: emp.职务 || '未填写',
                                    课程: sel.course,
                                    月份: sel.month,
                                    模块: sel.module,
                                    提交时间: new Date().toISOString(),
                                    审核状态: '待审核',
                                    请假状态: ''
                                });
                            }
                        });

                        if (duplicateCourses.length > 0) {
                            alert(`以下课程已报名，不能重复提交：${duplicateCourses.join('、')}`);
                            if (newSubmissions.length === 0) return;
                        }

                        submissions.push(...newSubmissions);
                        
                        // 保存到本地和共享存储
                        if (shareId) {
                            saveSharedData(shareId);
                        } else {
                            saveToStorage();
                        }

                        currentCourseSelections = [];
                        showSuccessToast(`成功提交 ${newSubmissions.length} 门课程报名`);
                        renderTrainee();
                    });
                }
            }, 100);

            const empIdInp = document.getElementById('empIdInput');
            const nameInp = document.getElementById('nameInput');
            const deptInp = document.getElementById('deptInput');
            const posInp = document.getElementById('posInput');
            const singleSubmitBtn = document.getElementById('singleSubmitBtn');
            const singleFeedback = document.getElementById('singleFeedbackMsg');

            if (empIdInp) {
                empIdInp.addEventListener('blur', function() {
                    const empId = this.value.trim();
                    if (!empId) return;
                    const emp = findEmployeeByEmpId(empId);
                    if (emp) {
                        nameInp.value = emp.姓名 || '';
                        deptInp.value = emp.部门 || '';
                        posInp.value = emp.职务 || '';
                        selectEmployee(empId);
                    }
                });
            }

            if (singleSubmitBtn) {
                singleSubmitBtn.addEventListener('click', function() {
                    const empId = empIdInp.value.trim();
                    const name = nameInp.value.trim();
                    const dept = deptInp.value.trim();
                    const pos = posInp.value.trim();
                    const course = document.getElementById('courseSelect').value;
                    const month = document.getElementById('monthSelect').value;
                    const mod = document.getElementById('moduleSelect').value;

                    if (!empId || !name || !dept) {
                        alert('请填写工号、姓名、部门（均为必填）');
                        return;
                    }
                    if (deadline && new Date() > new Date(deadline)) {
                        alert('报名已截止'); 
                        return;
                    }
                    if (isAlreadySubmitted(empId, course)) {
                        alert('该员工已报名此课程，请勿重复');
                        return;
                    }

                    const newSub = {
                        id: Date.now() + '-' + Math.random().toString(36).substr(2,8),
                        工号: empId, 
                        姓名: name, 
                        部门: dept, 
                        职务: pos || '未填写', 
                        课程: course, 
                        月份: month, 
                        模块: mod,
                        提交时间: new Date().toISOString(),
                        审核状态: '待审核',
                        请假状态: ''
                    };
                    submissions.push(newSub);

                    const idx = untrainedEmployees.findIndex(e => String(e.工号) === String(empId));
                    if (idx !== -1) {
                        untrainedEmployees.splice(idx, 1);
                    }

                    // 保存到本地和共享存储
                    if (shareId) {
                        saveSharedData(shareId);
                    } else {
                        saveToStorage();
                    }

                    if (singleFeedback) {
                        singleFeedback.style.display = 'inline-flex';
                        showSuccessToast('报名提交成功');
                        setTimeout(() => singleFeedback.style.display = 'none', 2000);
                    }

                    empIdInp.value = ''; 
                    nameInp.value = ''; 
                    deptInp.value = ''; 
                    posInp.value = '';

                    renderTrainee();
                });
            }
        }

        // ========== 管理员看板 ==========
        function renderAdmin() {
            // 根据历史筛选条件过滤 submissions
            let filteredSubs = [...submissions];

            function getQuarter(monthStr) {
                if (!monthStr) return null;
                const m = parseInt(monthStr.split('-')[1]);
                if (m >= 4 && m <= 6) return 'Q2';
                if (m >= 7 && m <= 9) return 'Q3';
                if (m >= 10 && m <= 12) return 'Q4';
                if (m >= 1 && m <= 3) return 'Q1';
                return null;
            }

            if (historyYear !== 'all') {
                filteredSubs = filteredSubs.filter(s => s.月份 && s.月份.startsWith(historyYear));
            }
            if (historyQuarter !== 'all') {
                filteredSubs = filteredSubs.filter(s => s.月份 && getQuarter(s.月份) === historyQuarter);
            }
            if (historyMonth !== 'all') {
                filteredSubs = filteredSubs.filter(s => s.月份 === historyMonth);
            }
            
            if (historyGrade !== 'all') {
                filteredSubs = filteredSubs.filter(s => {
                    const grade = getGradeByPosition(s.职务);
                    return grade === historyGrade;
                });
            }

            const pendingSubs = filteredSubs.filter(s => s.审核状态 === '待审核');
            const approvedSubs = filteredSubs.filter(s => s.审核状态 === '已审核');

            // 获取所有部门列表
            const allDepts = [...new Set(approvedSubs.map(s => getDeptUntilSecondDash(s.部门)))].sort();
            
            // 获取所有职级列表
            const allGrades = [...new Set(approvedSubs.map(s => {
                const grade = getGradeByPosition(s.职务);
                return grade;
            }))].filter(g => g !== '未填写' && g !== '其他').sort();
            
            // 根据部门筛选
            let displayApprovedSubs = approvedSubs;
            if (selectedDept !== 'all') {
                displayApprovedSubs = approvedSubs.filter(s => getDeptUntilSecondDash(s.部门) === selectedDept);
            }

            // 职级分布统计
            const gradeCount = {};
            const gradePeopleSet = new Set();
            
            approvedSubs.forEach(sub => {
                if (sub.职务 && sub.职务 !== '未填写' && sub.职务 !== '') {
                    const grade = getGradeByPosition(sub.职务);
                    if (!gradePeopleSet.has(sub.工号)) {
                        gradeCount[grade] = (gradeCount[grade] || 0) + 1;
                        gradePeopleSet.add(sub.工号);
                    }
                }
            });

            // 课程分布统计
            const courseCount = {};
            const coursePeopleSet = new Set();
            
            approvedSubs.forEach(sub => {
                if (sub.课程) {
                    const uniqueKey = sub.工号 + '_' + sub.课程;
                    if (!coursePeopleSet.has(uniqueKey)) {
                        courseCount[sub.课程] = (courseCount[sub.课程] || 0) + 1;
                        coursePeopleSet.add(uniqueKey);
                    }
                }
            });

            // 报名进度
            const deptPeopleMap = new Map();
            approvedSubs.forEach(sub => {
                if (!sub.部门) return;
                const shortDept = getDeptUntilSecondDash(sub.部门);
                if (!deptPeopleMap.has(shortDept)) {
                    deptPeopleMap.set(shortDept, new Set());
                }
                deptPeopleMap.get(shortDept).add(sub.工号);
            });

            const totalPeople = gradePeopleSet.size;
            
            const deptStats = [];
            for (let [dept, peopleSet] of deptPeopleMap.entries()) {
                deptStats.push({
                    dept: dept,
                    count: peopleSet.size,
                    percentage: totalPeople > 0 ? Math.round((peopleSet.size / totalPeople) * 100) : 0
                });
            }
            deptStats.sort((a, b) => b.count - a.count);

            // 部门报名人数
            const actualAttendees = approvedSubs.filter(sub => !sub.请假状态);
            const deptActualMap = new Map();
            actualAttendees.forEach(sub => {
                if (!sub.部门) return;
                const shortDept = getDeptUntilSecondDash(sub.部门);
                if (!deptActualMap.has(shortDept)) {
                    deptActualMap.set(shortDept, new Set());
                }
                deptActualMap.get(shortDept).add(sub.工号);
            });

            const deptActualData = [];
            for (let [dept, peopleSet] of deptActualMap.entries()) {
                deptActualData.push({
                    dept: dept,
                    count: peopleSet.size
                });
            }
            deptActualData.sort((a, b) => b.count - a.count);

            const hasGradeData = Object.keys(gradeCount).length > 0;
            const hasCourseData = Object.keys(courseCount).length > 0;

            // 生成年份选项
            const yearsSet = new Set();
            submissions.forEach(s => { if (s.月份) yearsSet.add(s.月份.substring(0,4)); });
            const years = ['all', ...Array.from(yearsSet).sort()];

            // 构建可编辑的已审核名单表格
            function buildEditableApprovedTable() {
                if (displayApprovedSubs.length === 0) {
                    return `<div class="empty-warning">暂无已审核的报名记录</div>`;
                }

                return `
                    <div class="editable-table-container" style="max-height: 400px; overflow: auto;">
                        <table class="editable-table">
                            <thead>
                                <tr>
                                    <th>工号</th>
                                    <th>姓名</th>
                                    <th>部门</th>
                                    <th>职务</th>
                                    <th>职级</th>
                                    <th>课程</th>
                                    <th>月份</th>
                                    <th>模块</th>
                                    <th>提交时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${displayApprovedSubs.map(sub => {
                                    const isEditing = editingSubmissionId === sub.id;
                                    const grade = getGradeByPosition(sub.职务);
                                    if (isEditing) {
                                        return `
                                            <tr>
                                                <td><input type="text" id="edit_工号" value="${sub.工号}" placeholder="工号"></td>
                                                <td><input type="text" id="edit_姓名" value="${sub.姓名}" placeholder="姓名"></td>
                                                <td><input type="text" id="edit_部门" value="${sub.部门}" placeholder="部门"></td>
                                                <td><input type="text" id="edit_职务" value="${sub.职务 || ''}" placeholder="职务"></td>
                                                <td>${grade}</td>
                                                <td>
                                                    <select id="edit_课程">
                                                        ${courses.map(c => `<option value="${c}" ${sub.课程 === c ? 'selected' : ''}>${c}</option>`).join('')}
                                                    </select>
                                                </td>
                                                <td>
                                                    <select id="edit_月份">
                                                        ${monthOptions.map(m => `<option value="${m}" ${sub.月份 === m ? 'selected' : ''}>${m}</option>`).join('')}
                                                    </select>
                                                </td>
                                                <td>
                                                    <select id="edit_模块">
                                                        ${moduleOptions.map(m => `<option value="${m}" ${sub.模块 === m ? 'selected' : ''}>模块${m}</option>`).join('')}
                                                    </select>
                                                </td>
                                                <td>${new Date(sub.提交时间).toLocaleString()}</td>
                                                <td>
                                                    <select id="edit_请假状态">
                                                        <option value="" ${!sub.请假状态 ? 'selected' : ''}>正常</option>
                                                        <option value="请假" ${sub.请假状态 === '请假' ? 'selected' : ''}>请假</option>
                                                    </select>
                                                </td>
                                                <td class="edit-actions">
                                                    <button class="btn-save" onclick="saveEdit('${sub.id}')">保存</button>
                                                    <button class="btn-cancel" onclick="cancelEdit()">取消</button>
                                                </td>
                                            </tr>
                                        `;
                                    } else {
                                        return `
                                            <tr>
                                                <td>${sub.工号}</td>
                                                <td>${sub.姓名}</td>
                                                <td>${getDeptUntilSecondDash(sub.部门)}</td>
                                                <td>${sub.职务 || '-'}</td>
                                                <td><span class="position-badge">${grade}</span></td>
                                                <td>${sub.课程}</td>
                                                <td>${sub.月份}</td>
                                                <td>${sub.模块}</td>
                                                <td>${new Date(sub.提交时间).toLocaleString()}</td>
                                                <td>
                                                    ${sub.请假状态 ? `<span class="leave-badge">${sub.请假状态}</span>` : '正常'}
                                                </td>
                                                <td class="edit-actions">
                                                    <button class="btn-edit" onclick="startEdit('${sub.id}')"><i class="fas fa-edit"></i> 编辑</button>
                                                    <button class="btn-leave" onclick="toggleLeave('${sub.id}')"><i class="fas fa-calendar-times"></i> 请假</button>
                                                    <button class="btn-delete" onclick="deleteSubmission('${sub.id}')"><i class="fas fa-trash"></i> 删除</button>
                                                </td>
                                            </tr>
                                        `;
                                    }
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            // 构建实际参训名单表格
            function buildActualAttendanceTable() {
                const actualAttendees = approvedSubs.filter(sub => !sub.请假状态);
                
                if (actualAttendees.length === 0) {
                    return `<div class="empty-warning">暂无实际参训人员</div>`;
                }

                return `
                    <div class="editable-table-container" style="max-height: 400px; overflow: auto;">
                        <table class="editable-table">
                            <thead>
                                <tr>
                                    <th>工号</th>
                                    <th>姓名</th>
                                    <th>部门</th>
                                    <th>职务</th>
                                    <th>职级</th>
                                    <th>课程</th>

            // 事件绑定

                    const data = new Uint8Array(le.target.result);
                    const workbook = XLSX.read(data, {type:'array'});
                    const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    
                    untrainedEmployees = rows.map(r => {
                        const empId = r.工号 || r['工号'] || r.员工编号 || r.employeeId || r.EmployeeID || r.empId || r.EmpID || '';
                        const name = r.姓名 || r['姓名'] || r.name || r.Name || r.员工姓名 || '';
                        
                        let dept = '';
                        const deptKeys = ['部门', '部门名称', 'department', 'Department', 'dept', 'Dept'];
                        for (let key of deptKeys) { 
                            if (r[key] && r[key] !== '') { 
                                dept = r[key]; 
                                break; 
                            }
                        }
                        
                        let pos = '';
                        const posKeys = ['职务', '职位', '岗位', 'position', 'Position', 'job', 'Job', '职称'];
                        for (let key of posKeys) { 
                            if (r[key] && r[key] !== '') { 
                                pos = r[key]; 
                                break; 
                            }
                        }
                        
                        if (!pos) {
                            const keys = Object.keys(r);
                            for (let key of keys) {
                                if (key.includes('职务') || key.includes('职位') || key.includes('岗位') || 
                                    key.includes('position') || key.includes('Position') || key.includes('job')) {
                                    pos = r[key];
                                    break;
                                }
                            }

                姓名: s.姓名,

                职务: s.职务,
                职级: getGradeByPosition(s.职务),
                课程: s.课程,
                月份: s.月份,
                模块: s.模块,
                状态: s.请假状态 || '正常'
            }));
            exportToExcel(exportData, '已审核名单', '已审核名单.xlsx');
        };

        window.exportProgress = function() {
            const deptStatsMap = new Map();
            submissions.filter(s => s.审核状态 === '已审核').forEach(sub => {
                if (!sub.部门) return;
                const shortDept = getDeptUntilSecondDash(sub.部门);
                if (!deptStatsMap.has(shortDept)) {
                    deptStatsMap.set(shortDept, new Set());
                }
                deptStatsMap.get(shortDept).add(sub.工号);
            });

            const exportData = [];
            for (let [dept, peopleSet] of deptStatsMap.entries()) {
                exportData.push({
                    部门: dept,
                    报名人数: peopleSet.size
                });
            }
            exportData.sort((a, b) => b.报名人数 - a.报名人数);
            exportToExcel(exportData, '报名进度', '报名进度.xlsx');
        };

        window.exportGrade = function() {
            const gradeCount = {};

                if (sub.职务 && sub.职务 !== '未填写' && sub.职务 !== '') {
                    const grade = getGradeByPosition(sub.职务);
                    if (!gradePeopleSet.has(sub.工号)) {
                        gradeCount[grade] = (gradeCount[grade] || 0) + 1;
                        gradePeopleSet.add(sub.工号);
                    }
                }
            });
            const exportData = Object.entries(gradeCount).map(([grade, count]) => ({
                职级: grade,
                人数: count
            }));
            exportToExcel(exportData, '职级分布', '职级分布.xlsx');

            const coursePeopleSet = new Set();
            submissions.filter(s => s.审核状态 === '已审核').forEach(sub => {
                if (sub.课程) {
                    const key = sub.工号 + '_' + sub.课程;
                    if (!coursePeopleSet.has(key)) {
                        courseCount[sub.课程] = (courseCount[sub.课程] || 0) + 1;
                        coursePeopleSet.add(key);
                    }
                }
            });
            const exportData = Object.entries(courseCount).map(([course, count]) => ({
                课程: course,
                报名人数: count
            }));
            exportToExcel(exportData, '课程分布', '课程分布.xlsx');
        };

        window.exportDept = function() {
            const deptActualMap = new Map();
            submissions.filter(s => s.审核状态 === '已审核' && !s.请假状态).forEach(sub => {
                if (sub.部门) {
                    const shortDept = getDeptUntilSecondDash(sub.部门);
                    if (!deptActualMap.has(shortDept)) {
                        deptActualMap.set(shortDept, new Set());
                    }
                    deptActualMap.get(shortDept).add(sub.工号);
                }
            });
            const exportData = [];
            for (let [dept, peopleSet] of deptActualMap.entries()) {
                exportData.push({
                    部门: dept,
                    报名人数: peopleSet.size
                });
            }
            exportData.sort((a, b) => b.报名人数 - a.报名人数);
            exportToExcel(exportData, '部门报名人数', '部门报名人数.xlsx');
        };

        window.exportActual = function() {
            const actual = submissions.filter(s => s.审核状态 === '已审核' && !s.请假状态);
            const exportData = actual.map(s => ({
                工号: s.工号,
                姓名: s.姓名,
                部门: getDeptUntilSecondDash(s.部门),
                职务: s.职务,
                职级: getGradeByPosition(s.职务),
                课程: s.课程,
                月份: s.月份,
                模块: s.模块,
                状态: '正常'
            }));
            exportToExcel(exportData, '实际参训名单', '实际参训名单.xlsx');
        };

        window.filterByDept = function(dept) {
            selectedDept = dept;
            renderAdmin();
        };

        window.toggleLeave = function(id) {
            const sub = submissions.find(s => s.id === id);
            if (sub) {
                sub.请假状态 = sub.请假状态 ? '' : '请假';
                
                if (shareId) {
                    saveSharedData(shareId);
                } else {
                    saveToStorage();
                }
                
                showSuccessToast(sub.请假状态 ? '已标记为请假' : '已取消请假');
                renderAdmin();
            }
        };

        window.startEdit = function(id) {
            editingSubmissionId = id;
            renderAdmin();
        };

        window.cancelEdit = function() {
            editingSubmissionId = null;
            renderAdmin();
        };

        window.saveEdit = function(id) {
            const sub = submissions.find(s => s.id === id);
            if (!sub) return;

            sub.工号 = document.getElementById('edit_工号')?.value.trim() || sub.工号;
            sub.姓名 = document.getElementById('edit_姓名')?.value.trim() || sub.姓名;
            sub.部门 = document.getElementById('edit_部门')?.value.trim() || sub.部门;
            sub.职务 = document.getElementById('edit_职务')?.value.trim() || '';
            sub.课程 = document.getElementById('edit_课程')?.value || sub.课程;
            sub.月份 = document.getElementById('edit_月份')?.value || sub.月份;
            sub.模块 = document.getElementById('edit_模块')?.value || sub.模块;
            sub.请假状态 = document.getElementById('edit_请假状态')?.value || '';

            if (shareId) {
                saveSharedData(shareId);
            } else {
                saveToStorage();
            }
            
            editingSubmissionId = null;
            showSuccessToast('报名信息已更新');
            renderAdmin();
        };

        window.deleteSubmission = function(id) {
            if (confirm('确定要删除这条报名记录吗？')) {
                submissions = submissions.filter(s => s.id !== id);
                
                if (shareId) {
                    saveSharedData(shareId);
                } else {
                    saveToStorage();
                }
                
                showSuccessToast('报名记录已删除');
                renderAdmin();
            }
        };

        // 角色切换
        async function switchRole(role) {
            currentRole = role;
            btnTrainee.classList.toggle('active', role==='trainee');
            btnAdmin.classList.toggle('active', role==='admin');
            
            if (role === 'trainee') {
                renderTrainee();
            } else {
                try {
                    if (!adminAuthenticated) {
                        await showPasswordModal();
                    }
                    renderAdmin();
                } catch (e) {}
            }
        }

        function showPasswordModal() {
            return new Promise((resolve, reject) => {
                if (adminAuthenticated) { resolve(true); return; }
                modal.style.display = 'flex';
                userInput.value = ''; passwordInput.value = ''; userInput.focus();
                const onCancel = () => { cleanup(); reject('cancelled'); };
                const onSubmit = () => {
                    if (userInput.value.trim() === ADMIN_USER && passwordInput.value.trim() === ADMIN_PASSWORD) {
                        adminAuthenticated = true; cleanup(); resolve(true);
                    } else { alert('账号或密码错误'); passwordInput.value = ''; userInput.focus(); }
                };
                const onKeyDown = (e) => { if(e.key==='Enter') { e.preventDefault(); onSubmit(); } else if(e.key==='Escape') onCancel(); };
                const cleanup = () => {
                    modal.style.display = 'none';
                    cancelBtn.removeEventListener('click', onCancel);
                    submitBtn.removeEventListener('click', onSubmit);
                    userInput.removeEventListener('keydown', onKeyDown);
                    passwordInput.removeEventListener('keydown', onKeyDown);
                };
                cancelBtn.addEventListener('click', onCancel);
                submitBtn.addEventListener('click', onSubmit);
                userInput.addEventListener('keydown', onKeyDown);
                passwordInput.addEventListener('keydown', onKeyDown);
            });
        }

        btnTrainee.addEventListener('click', () => switchRole('trainee'));
        btnAdmin.addEventListener('click', () => switchRole('admin'));

        // 启动
        switchRole('admin');
    })();
</script>
</body>
</html>
